<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Wider-Chatbots</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h2>Wider-Chatbots</h2>
            <div class="header-controls">
                <button id="settingsBtn" class="icon-btn" aria-label="Settings" title="Settings">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </button>
                <label class="switch">
                    <input type="checkbox" id="enableToggle" checked>
                    <span class="slider round"></span>
                </label>
            </div>
        </div>

        <div id="mainView">
            <div class="control-group" id="controls">
                <label for="widthSlider">Chat Width: <span id="widthValue">1000</span>px</label>
                <input type="range" id="widthSlider" min="200" max="3000" step="50" value="1000">
            </div>

            <div class="presets" id="presets">
                <button id="btnPreset1" data-width="800">Narrow</button>
                <button id="btnPreset2" data-width="1200">Wide</button>
                <button id="btnPreset3" data-width="1500">Ultra</button>
            </div>
        </div>

        <div id="settingsPanel" class="settings-panel hidden">
            <h3 class="settings-title">Edit Presets</h3>
            <div class="preset-edit">
                <label>Preset 1</label>
                <div class="preset-inputs">
                    <input type="text" id="preset1Name" value="Narrow" placeholder="Name">
                    <input type="number" id="preset1Width" value="800" placeholder="Width (px)" min="200" max="3000">
                </div>
            </div>
            <div class="preset-edit">
                <label>Preset 2</label>
                <div class="preset-inputs">
                    <input type="text" id="preset2Name" value="Wide" placeholder="Name">
                    <input type="number" id="preset2Width" value="1200" placeholder="Width (px)" min="200" max="3000">
                </div>
            </div>
            <div class="preset-edit">
                <label>Preset 3</label>
                <div class="preset-inputs">
                    <input type="text" id="preset3Name" value="Ultra" placeholder="Name">
                    <input type="number" id="preset3Width" value="1500" placeholder="Width (px)" min="200" max="3000">
                </div>
            </div>
            <div class="settings-actions">
                <button id="cancelSettingsBtn" class="secondary-btn">Cancel</button>
                <button id="saveSettingsBtn" class="primary-btn">Save</button>
            </div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
